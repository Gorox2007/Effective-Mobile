services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: intern_auth
      POSTGRES_USER: intern_user
      POSTGRES_PASSWORD: intern_pass
    volumes:
      - pg_data:/var/lib/postgresql/data

  api:
    build: .
    command: >
      sh -c "python seed.py &&
             uvicorn main:app --host 0.0.0.0 --port 8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - .:/app

volumes:
  pg_data:
